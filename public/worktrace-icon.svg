<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">WorkTrace icon</title>
  <desc id="desc">A blue and cyan activity trace circle with a check mark.</desc>
  <defs>
    <linearGradient id="ring" x1="104" y1="76" x2="404" y2="426" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2563eb"/>
      <stop offset="0.48" stop-color="#0284c7"/>
      <stop offset="1" stop-color="#14e0bd"/>
    </linearGradient>
    <linearGradient id="check" x1="178" y1="300" x2="398" y2="122" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0891b2"/>
      <stop offset="0.62" stop-color="#10e0b2"/>
      <stop offset="1" stop-color="#19f2c7"/>
    </linearGradient>
    <linearGradient id="speed" x1="42" y1="232" x2="212" y2="232" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2563eb"/>
      <stop offset="0.55" stop-color="#0ea5e9"/>
      <stop offset="1" stop-color="#14e0bd"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#020617" flood-opacity="0.32"/>
    </filter>
  </defs>

  <rect width="512" height="512" rx="112" fill="#07111f"/>

  <g filter="url(#softShadow)">
    <path
      d="M118 174C148 91 236 45 322 70c25 7 47 20 66 37"
