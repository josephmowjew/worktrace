      stroke-linecap="butt"
    />
    <path
      d="M137 332h70l18-46 20 80 22-53 13 31h60"
      fill="none"
      stroke="#19f2c7"
      stroke-width="13"
      stroke-linecap="round"
      stroke-linejoin="round"
    />
    <path
      d="M177 230l71 72L392 143"
      fill="none"
      stroke="url(#check)"
      stroke-width="54"
      stroke-linecap="round"
      stroke-linejoin="round"
    />
    <path
      d="M71 203h96M51 248h130M72 293h115"
