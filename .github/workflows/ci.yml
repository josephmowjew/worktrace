name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  windows-checks:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Run frontend tests
        run: npm run test:run

      - name: Run native tests
        shell: powershell
        run: npm run tauri:test

      - name: Check version sync
        run: npm run check:version-sync

      - name: Check command parity
        run: npm run check:command-parity
